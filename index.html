<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CineVault - Top Movies & Series</title>
    <meta name="description"
        content="Browse the top 100 movies and series from IMDB with ratings, cast, and details." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <!-- Header -->
    <header class="header" id="header">
        <div class="header-inner">
            <a href="#" class="logo" data-nav="movies">
                <div class="logo-icon">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect width="18" height="18" x="2" y="2" rx="2" />
                        <path d="m10 2 1 20" />
                        <path d="m13 2-1 20" />
                        <path d="M2 10h20" />
                        <path d="M2 14h20" />
                    </svg>
                </div>
                <span class="logo-text">CineVault</span>
            </a>
            <nav class="nav">
                <a href="#" class="nav-link active" id="nav-movies" data-nav="movies">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect width="18" height="18" x="2" y="2" rx="2" />
                        <path d="m10 2 1 20" />
                        <path d="m13 2-1 20" />
                        <path d="M2 10h20" />
                        <path d="M2 14h20" />
                    </svg>
                    <span class="nav-label">Movies</span>
                </a>
                <a href="#" class="nav-link" id="nav-series" data-nav="series">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect width="20" height="15" x="2" y="7" rx="2" ry="2" />
                        <polyline points="17 2 12 7 7 2" />
                    </svg>
                    <span class="nav-label">Series</span>
                </a>
            </nav>
        </div>
    </header>

    
    <main class="main" id="main-content">
    
    </main>

    <script src="script.js"></script>
</body>
</html>
